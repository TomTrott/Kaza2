nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin: ['http://localhost:3000']
        allow_headers: ['*']
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        expose_headers: ['Authorization']
        max_age: 3600

    paths:
        '^/':
            allow_origin: ['http://localhost:3000']
            allow_headers: ['*']
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            max_age: 3600